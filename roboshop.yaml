- name: create aws ec2 instance and route 53 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-0cb8adc243e0345f2
    ami_id: ami-0220d79f3f480ecf5
    env: dev
    instances:
    - mongo
    - catalogue
  tasks:
   - name: create a aws instance 
     amazon.aws.ec2_instance:
      instance_type: t3.micro
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      name: "{{ item }}-{{ env }}"
      tags:
        Project: roboshop
        Component: "{{ item }}"
        Env: "{{  env }}"
        Name: "{{ item }}-{{ env }}"
      loop: "{{ instances }}"
      register: ec2_output

- name: print the output
  ansible.builtin.debug:
    msg: "{{ ec2_output }}"
      